<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Abhishiek Kurra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .contact-form {
            text-align: left;
            margin-top: 3rem;
            background: var(--secondary-bg);
            padding: 3rem;
            border-radius: 12px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: var(--primary-bg);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 4px;
            color: var(--white);
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .social-links {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        .social-link {
            font-size: 1.5rem;
            color: var(--text-dim);
        }
        .social-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">AK.</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="experience.html">Experience</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main class="container">
        <div class="contact-container reveal">
            <h2 class="section-title">Get In Touch</h2>
            <p style="color: var(--text-dim); margin-top: 1rem;">I’m currently looking for new opportunities and my inbox is always open. Whether you have a question or just want to say hi, I’ll try my best to get back to you!</p>
            
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>

            <div class="social-links">
                <a href="https://www.linkedin.com/in/abhishiek-kurra-017a8616a/" class="social-link" title="LinkedIn" target="_blank">LinkedIn</a>
                <a href="https://github.com/darthdragneel1/" class="social-link" title="GitHub" target="_blank">GitHub</a>
                <a href="https://notular.net" class="social-link" title="Notular" target="_blank">Notular</a>
                <a href="mailto:abhishekkurra1999@gmail.com" class="social-link" title="Email">Email</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Abhishiek Kurra. Let's Connect.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.querySelector('.contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you for reaching out! (Note: This is a demo form)');
        });
    </script>
</body>
</html>
